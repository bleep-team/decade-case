name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

# The Next.js app deploys via the native Vercel ↔ GitHub integration (auto-deploys
# on push to main). This workflow only runs database migrations against Neon when
# the schema changes.
#
# Required repo secret:
#   DATABASE_URL — Neon production connection string

jobs:
  detect-changes:
    name: Detect schema changes
    runs-on: ubuntu-latest
    outputs:
      db-changed: ${{ steps.changes.outputs.db }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            db:
              - 'packages/db/**'

  migrate-db:
    name: Run database migrations
    needs: detect-changes
    if: needs.detect-changes.outputs.db-changed == 'true'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Migrations apply the schema + seed the reference stocks (migration 0001).
      # db:seed-dev adds demo brokers so the broker API is testable — a stopgap
      # until brokers are provisioned from Clerk sign-ups. Both are idempotent.
      - name: Run migrations + seed demo brokers
        run: pnpm --filter @decade/db db:migrate && pnpm --filter @decade/db db:seed-dev
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
