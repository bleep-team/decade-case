name: CI — PR checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0
  # Build-time placeholders so `next build` succeeds in CI without real secrets.
  # NEXT_PUBLIC_* values are inlined into the client bundle; real keys live in Vercel.
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
  CLERK_SECRET_KEY: sk_test_ci_placeholder
  DATABASE_URL: postgres://decade:decade@localhost:5432/decade
  # Enables the @decade/exchange-runtime DB integration test.
  TEST_DATABASE_URL: postgres://decade:decade@localhost:5432/decade

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: decade
          POSTGRES_PASSWORD: decade
          POSTGRES_DB: decade
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U decade -d decade"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations (for integration tests)
        run: pnpm --filter @decade/db db:migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
